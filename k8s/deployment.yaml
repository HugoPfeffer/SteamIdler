apiVersion: apps/v1
kind: Deployment
metadata:
  name: steamidler
  labels:
    app: steamidler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: steamidler
  template:
    metadata:
      labels:
        app: steamidler
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: steamidler
          image: steamidler:latest
          envFrom:
            - secretRef:
                name: steamidler-credentials
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: config-storage
              mountPath: /app/src/config
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: steamidler-config
